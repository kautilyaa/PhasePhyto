# Rice leaf disease benchmark

seed: 42
device: "cuda"
checkpoint_dir: "checkpoints/rice_leaf"
project_name: "phasephyto-rice-leaf"

model:
  backbone_name: "vit_base_patch16_224"
  fusion_dim: 256
  pretrained_backbone: true

training:
  lr: 5.0e-5
  weight_decay: 1.0e-2
  epochs: 30
  warmup_epochs: 3
  batch_size: 32
  patience: 8
  loss: "focal"
  focal_gamma: 2.0

data:
  root: "data/plant_benchmarks/rice_leaf"
  use_case: "rice_leaf"
  image_size: 224
  val_split: 0.2
  source_dir: "data/plant_benchmarks/rice_leaf"
