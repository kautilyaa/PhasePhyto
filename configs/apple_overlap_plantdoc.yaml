# Strict apple-overlap benchmark: PlantVillage source -> PlantDoc target
# Shared label space: Apple___healthy, Apple___Apple_scab, Apple___Cedar_apple_rust

seed: 42
device: "cuda"
checkpoint_dir: "checkpoints/apple_overlap_plantdoc"
project_name: "phasephyto-apple-overlap-plantdoc"

model:
  backbone_name: "vit_base_patch16_224"
  fusion_dim: 256
  pretrained_backbone: true
  freeze_backbone: false

training:
  lr: 5.0e-5
  weight_decay: 1.0e-2
  epochs: 30
  warmup_epochs: 3
  batch_size: 32
  patience: 8
  loss: "focal"
  focal_gamma: 2.0

data:
  root: "data/overlap/apple_strict"
  use_case: "plant_disease"
  image_size: 224
  val_split: 0.2
  source_dir: "data/overlap/apple_strict/plantvillage"
  target_dir: "data/overlap/apple_strict/plantdoc"
  train_dir: ""
  val_dir: ""
  eval_source_dir: "data/overlap/apple_strict/plantvillage"
  eval_target_dir: "data/overlap/apple_strict/plantdoc"
